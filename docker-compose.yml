services:
  db:
    image: postgres:16-alpine
    container_name: zapatos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: zapatos-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy